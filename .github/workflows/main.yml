name: Run Screener Job

on:
  schedule:
    # 台灣時間週一至週五早上 07:00 (UTC 23:00)
    - cron: '0 23 * * 0-4'
  workflow_dispatch: # 允許您在 GitHub 介面上手動點擊執行

jobs:
  run-screener:
    runs-on: ubuntu-latest
    # 加入這一行來消除警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 設定 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安裝依賴 (如果您的程式有 requirements.txt)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. 執行您的程式
      - name: Run screener.py
        run: python screener.py
